<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2 Curso — CEDM Santa Teresa</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --negro: #0a0a0f;
    --morado-claro: #a78bfa;
    --blanco: #f3f0ff;
    --gris: rgba(255,255,255,0.45);
    --borde: rgba(167,139,250,0.15);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--negro); color:var(--blanco); min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 60% 50% at 10% 0%,#3d1a6e44 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 90% 100%,#1a0a2e66 0%,transparent 60%); z-index:0; pointer-events:none; }
  nav { position:relative; z-index:100; background:rgba(10,10,15,0.9); backdrop-filter:blur(20px); padding:18px 40px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--borde); }
  .nav-logo { font-family:'Playfair Display',serif; font-size:1rem; color:var(--morado-claro); letter-spacing:0.08em; }
  .nav-links a { color:var(--gris); margin-left:28px; text-decoration:none; font-size:0.8rem; letter-spacing:0.1em; text-transform:uppercase; transition:color .2s; }
  .nav-links a:hover,.nav-links a.active { color:var(--morado-claro); }
  .page-header { position:relative; z-index:1; text-align:center; padding:70px 20px 44px; }
  .curso-badge { display:inline-block; background:rgba(167,139,250,0.1); border:1px solid rgba(167,139,250,0.3); color:var(--morado-claro); font-size:0.68rem; letter-spacing:0.22em; text-transform:uppercase; padding:7px 20px; border-radius:50px; margin-bottom:22px; }
  .page-header h1 { font-family:'Playfair Display',serif; font-size:clamp(2.4rem,6vw,4.2rem); font-weight:900; margin-bottom:10px; }
  .page-header h1 span { background:linear-gradient(135deg,#a78bfa,#7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .page-header p { color:var(--gris); font-size:0.95rem; }
  .back-btn { display:inline-block; margin-top:20px; color:rgba(255,255,255,0.3); font-size:0.78rem; text-decoration:none; letter-spacing:0.1em; transition:color .2s; }
  .back-btn:hover { color:var(--morado-claro); }
  .tabs { position:relative; z-index:1; display:flex; justify-content:center; gap:12px; padding:0 20px 40px; flex-wrap:wrap; }
  .tab-btn { background:rgba(255,255,255,0.04); border:1px solid var(--borde); color:var(--gris); padding:10px 26px; border-radius:50px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.85rem; letter-spacing:0.08em; transition:all .25s; }
  .tab-btn.active,.tab-btn:hover { background:rgba(167,139,250,0.12); border-color:rgba(167,139,250,0.4); color:var(--morado-claro); }
  .content { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:0 24px 90px; }
  .section { display:none; }
  .section.active { display:block; }
  .section-header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; margin-bottom:28px; padding-bottom:18px; border-bottom:1px solid var(--borde); }
  .section-titulo { font-family:'Playfair Display',serif; font-size:1.7rem; color:#fff; }
  .filtros { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .filtros label { font-size:0.72rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--gris); }
  .filtros input[type="date"],.filtros select { background:rgba(255,255,255,0.04); border:1px solid var(--borde); border-radius:8px; color:var(--blanco); font-family:'DM Sans',sans-serif; font-size:0.82rem; padding:7px 12px; outline:none; cursor:pointer; transition:border-color .2s; color-scheme:dark; }
  .filtros select option { background:#1a0a2e; }
  .filtros input[type="date"]:focus,.filtros select:focus { border-color:rgba(167,139,250,0.5); }
  .btn-limpiar { background:transparent; border:1px solid var(--borde); color:var(--gris); font-family:'DM Sans',sans-serif; font-size:0.72rem; padding:7px 13px; border-radius:8px; cursor:pointer; transition:all .2s; }
  .btn-limpiar:hover { border-color:rgba(167,139,250,0.4); color:var(--morado-claro); }
  .item-card { background:rgba(255,255,255,0.03); border:1px solid var(--borde); border-radius:14px; padding:20px 24px; margin-bottom:14px; transition:background .2s,border-color .2s,transform .2s; backdrop-filter:blur(6px); }
  .item-card:hover { background:rgba(167,139,250,0.07); border-color:rgba(167,139,250,0.3); transform:translateX(6px); }
  .item-card h3 { font-size:1rem; font-weight:500; margin-bottom:6px; color:#fff; }
  .item-card p { font-size:0.86rem; color:var(--gris); font-weight:300; line-height:1.55; }
  .item-meta { display:inline-block; font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--morado-claro); margin-bottom:8px; background:rgba(167,139,250,0.1); padding:3px 10px; border-radius:20px; }
  .horario-wrap { overflow-x:auto; }
  .horario-table { width:100%; border-collapse:collapse; font-size:0.84rem; min-width:580px; }
  .horario-table th { background:rgba(167,139,250,0.1); color:var(--morado-claro); font-weight:500; letter-spacing:0.08em; text-transform:uppercase; font-size:0.7rem; padding:13px 16px; text-align:left; border-bottom:1px solid var(--borde); }
  .horario-table td { padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.04); color:rgba(255,255,255,0.7); }
  .horario-table tr:hover td { background:rgba(167,139,250,0.05); color:#fff; }
  .materia-tag { display:inline-block; background:rgba(167,139,250,0.1); border:1px solid rgba(167,139,250,0.2); color:var(--morado-claro); padding:3px 10px; border-radius:20px; font-size:0.75rem; }
  .estado { text-align:center; padding:50px 20px; color:rgba(255,255,255,0.2); font-size:.9rem; }
  .estado-spinner { width:32px; height:32px; border:3px solid rgba(167,139,250,0.1); border-top-color:var(--morado-claro); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error-msg { color:#f87171; background:rgba(248,113,113,0.07); border:1px solid rgba(248,113,113,0.2); border-radius:12px; padding:18px 22px; font-size:.85rem; line-height:1.6; }
  .sin-resultados { text-align:center; padding:40px 20px; color:rgba(255,255,255,0.2); font-size:.88rem; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">CEDM · Santa Teresa de Avila</div>
  <div class="nav-links">
    <a href="../index.html">Inicio</a>
    <a href="primero.html">1 Curso</a>
    <a href="segundo.html" class="active">2 Curso</a>
    <a href="tercero.html">3 Curso</a>
  </div>
</nav>

<div class="page-header">
  <div class="curso-badge">Segundo Curso</div>
  <h1>Curso <span>Segundo</span></h1>
  <p>Tareas y horarios actualizados en tiempo real</p>
  <a class="back-btn" href="../index.html">← Volver al inicio</a>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="cambiarTab('tareas', this)">📚 Tareas</button>
  <button class="tab-btn" onclick="cambiarTab('horarios', this)">🕒 Horarios</button>
</div>

<div class="content">
  <div class="section active" id="tareas">
    <div class="section-header">
      <div class="section-titulo">📚 Tareas</div>
      <div class="filtros">
        <label>Fecha</label>
        <input type="date" id="filtro-fecha-tareas" onchange="filtrarTareas()">
        <label>Materia</label>
        <select id="filtro-materia-tareas" onchange="filtrarTareas()">
          <option value="">Todas</option>
        </select>
        <button class="btn-limpiar" onclick="limpiarFiltrosTareas()">Limpiar</button>
      </div>
    </div>
    <div id="tareas-contenido">
      <div class="estado"><div class="estado-spinner"></div>Cargando tareas...</div>
    </div>
  </div>

  <div class="section" id="horarios">
    <div class="section-header">
      <div class="section-titulo">🕒 Horario Semanal</div>
    </div>
    <div class="horario-wrap">
      <div id="horarios-contenido">
        <div class="estado"><div class="estado-spinner"></div>Cargando horario...</div>
      </div>
    </div>
  </div>
</div>

<script src="../config.js"></script>
<script>
  const CURSO = "segundo";
  let todasLasTareas = [];

  function cambiarTab(tab, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    btn.classList.add('active');
  }

  function normalizarFecha(str) {
    if (!str) return "";
    const m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (m) return `${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;
    return str.substring(0, 10);
  }

  function renderTareas(filas) {
    if (!filas.length) return '<div class="sin-resultados">No hay tareas para mostrar.</div>';
    return filas.map(f => `
      <div class="item-card">
        <span class="item-meta">${f["Materia"] || ""} · Entrega: ${f["Entrega"] || "—"}</span>
        <h3>${f["Titulo"] || "(sin titulo)"}</h3>
        <p>${f["Descripcion"] || ""}</p>
      </div>`).join("");
  }

  function poblarMaterias(filas) {
    const select = document.getElementById("filtro-materia-tareas");
    const materias = [...new Set(filas.map(f => f["Materia"]).filter(Boolean))].sort();
    materias.forEach(m => {
      const opt = document.createElement("option");
      opt.value = m; opt.textContent = m;
      select.appendChild(opt);
    });
  }

  function filtrarTareas() {
    const fecha = document.getElementById("filtro-fecha-tareas").value;
    const materia = document.getElementById("filtro-materia-tareas").value;
    let filtradas = todasLasTareas;
    if (fecha) filtradas = filtradas.filter(f => normalizarFecha(f["Entrega"]) === fecha);
    if (materia) filtradas = filtradas.filter(f => f["Materia"] === materia);
    document.getElementById("tareas-contenido").innerHTML = renderTareas(filtradas);
  }

  function limpiarFiltrosTareas() {
    document.getElementById("filtro-fecha-tareas").value = "";
    document.getElementById("filtro-materia-tareas").value = "";
    document.getElementById("tareas-contenido").innerHTML = renderTareas(todasLasTareas);
  }

  function renderHorarios(filas) {
    if (!filas.length) return '<div class="sin-resultados">No hay horario cargado.</div>';
    const dias = ["Lunes","Martes","Miercoles","Jueves","Viernes"];
    const ths = dias.map(d => `<th>${d}</th>`).join("");
    const rows = filas.map(f => {
      const celdas = dias.map(d => {
        const v = f[d] || "";
        return `<td>${v ? `<span class="materia-tag">${v}</span>` : "—"}</td>`;
      }).join("");
      return `<tr><td>${f["Hora"] || ""}</td>${celdas}</tr>`;
    }).join("");
    return `<table class="horario-table"><thead><tr><th>Hora</th>${ths}</tr></thead><tbody>${rows}</tbody></table>`;
  }

  async function cargarTareas() {
    const contenedor = document.getElementById("tareas-contenido");
    try {
      const cfg = SHEETS_CONFIG.tareas;
      const filas = await cargarHoja(cfg.spreadsheetId, cfg.hoja);
      todasLasTareas = filas.filter(f => (f["Curso"] || "").toLowerCase() === CURSO);
      poblarMaterias(todasLasTareas);
      contenedor.innerHTML = renderTareas(todasLasTareas);
    } catch (e) {
      contenedor.innerHTML = `<div class="error-msg">No se pudieron cargar las tareas.<br><small>${e.message}</small></div>`;
    }
  }

  async function cargarHorario() {
    const contenedor = document.getElementById("horarios-contenido");
    try {
      const cfg = SHEETS_CONFIG.horarios;
      const filas = await cargarHoja(cfg.spreadsheetId, cfg.hojas[CURSO]);
      contenedor.innerHTML = renderHorarios(filas);
    } catch (e) {
      contenedor.innerHTML = `<div class="error-msg">No se pudo cargar el horario.<br><small>${e.message}</small></div>`;
    }
  }

  cargarTareas();
  cargarHorario();
</script>
</body>
</html>
