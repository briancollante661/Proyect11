<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3° Curso — CEDM Santa Teresa</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --dorado:#d040f0; --morado-oscuro:#000000; --color-curso:#f9a875; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--morado-oscuro); min-height:100vh; color:#fff; }
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 70% 50% at 15% 15%,#7a3a1044 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 85% 85%,#1a0a4466 0%,transparent 60%); z-index:0; }
  nav { position:relative; z-index:10; background:rgba(30,10,80,.85); backdrop-filter:blur(12px); padding:16px 32px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(240,192,64,.2); }
  .nav-logo { font-family:'Playfair Display',serif; font-size:.95rem; color:var(--dorado); }
  .nav-links a { color:rgba(255,255,255,.65); margin-left:20px; text-decoration:none; font-size:.82rem; letter-spacing:.08em; text-transform:uppercase; transition:color .2s; }
  .nav-links a:hover,.nav-links a.active { color:var(--dorado); }
  .page-header { position:relative; z-index:1; text-align:center; padding:60px 20px 40px; }
  .curso-badge { display:inline-block; background:rgba(249,168,117,.15); border:1px solid rgba(249,168,117,.35); color:var(--color-curso); font-size:.7rem; letter-spacing:.2em; text-transform:uppercase; padding:6px 18px; border-radius:50px; margin-bottom:20px; }
  .page-header h1 { font-family:'Playfair Display',serif; font-size:clamp(2.2rem,5vw,3.8rem); font-weight:900; margin-bottom:10px; }
  .page-header h1 span { color:var(--dorado); }
  .page-header p { color:rgba(255,255,255,.45); font-size:.95rem; }
  .back-btn { display:inline-block; margin-top:18px; color:rgba(255,255,255,.45); font-size:.8rem; text-decoration:none; letter-spacing:.1em; transition:color .2s; }
  .back-btn:hover { color:var(--dorado); }
  .tabs { position:relative; z-index:1; display:flex; justify-content:center; gap:12px; padding:0 20px 36px; flex-wrap:wrap; }
  .tab-btn { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); color:rgba(255,255,255,.55); padding:10px 24px; border-radius:50px; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:.85rem; letter-spacing:.08em; transition:all .25s; }
  .tab-btn.active,.tab-btn:hover { background:rgba(240,192,64,.15); border-color:rgba(240,192,64,.45); color:var(--dorado); }
  .content { position:relative; z-index:1; max-width:820px; margin:0 auto; padding:0 24px 80px; }
  .section { display:none; }
  .section.active { display:block; }
  .section-title { font-family:'Playfair Display',serif; font-size:1.6rem; color:var(--dorado); margin-bottom:24px; padding-bottom:12px; border-bottom:1px solid rgba(240,192,64,.2); }
  .item-card { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.09); border-radius:14px; padding:20px 24px; margin-bottom:14px; transition:background .2s,border-color .2s,transform .2s; backdrop-filter:blur(4px); }
  .item-card:hover { background:rgba(249,168,117,.08); border-color:rgba(249,168,117,.25); transform:translateX(6px); }
  .item-card h3 { font-size:1rem; font-weight:500; margin-bottom:6px; color:#fff; }
  .item-card p { font-size:.87rem; color:rgba(255,255,255,.5); font-weight:300; line-height:1.5; }
  .item-meta { display:inline-block; font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--color-curso); margin-bottom:8px; background:rgba(249,168,117,.1); padding:3px 10px; border-radius:20px; }
  .horario-table { width:100%; border-collapse:collapse; font-size:.85rem; }
  .horario-table th { background:rgba(240,192,64,.12); color:var(--dorado); font-weight:500; letter-spacing:.08em; text-transform:uppercase; font-size:.72rem; padding:12px 16px; text-align:left; border-bottom:1px solid rgba(240,192,64,.2); }
  .horario-table td { padding:12px 16px; border-bottom:1px solid rgba(255,255,255,.05); color:rgba(255,255,255,.75); }
  .horario-table tr:hover td { background:rgba(249,168,117,.06); color:#fff; }
  .materia-tag { display:inline-block; background:rgba(249,168,117,.12); border:1px solid rgba(249,168,117,.22); color:var(--color-curso); padding:3px 10px; border-radius:20px; font-size:.75rem; }
  .estado { text-align:center; padding:40px 20px; color:rgba(255,255,255,.35); font-size:.9rem; }
  .estado-spinner { width:32px; height:32px; border:3px solid rgba(255,255,255,.1); border-top-color:var(--color-curso); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .error-msg { color:#f87171; background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.2); border-radius:10px; padding:16px 20px; font-size:.85rem; line-height:1.6; }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">CEDM · Santa Teresa de Ávila</div>
  <div class="nav-links">
    <a href="../index.html">← Inicio</a>
    <a href="primero.html">1° Curso</a>
    <a href="segundo.html">2° Curso</a>
    <a href="tercero.html" class="active">3° Curso</a>
  </div>
</nav>

<div class="page-header">
  <div class="curso-badge">Tercer Curso</div>
  <h1>Curso <span>Tercero</span></h1>
  <p>Avisos, tareas y horarios — datos en tiempo real desde Google Sheets</p>
  <a class="back-btn" href="../index.html">← Volver al inicio</a>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="cambiarTab('avisos', this)">📢 Avisos</button>
  <button class="tab-btn" onclick="cambiarTab('tareas', this)">📚 Tareas</button>
  <button class="tab-btn" onclick="cambiarTab('horarios', this)">🕒 Horarios</button>
</div>

<div class="content">
  <div class="section active" id="avisos">
    <div class="section-title">📢 Avisos</div>
    <div id="avisos-contenido"><div class="estado"><div class="estado-spinner"></div>Cargando avisos...</div></div>
  </div>
  <div class="section" id="tareas">
    <div class="section-title">📚 Tareas</div>
    <div id="tareas-contenido"><div class="estado"><div class="estado-spinner"></div>Cargando tareas...</div></div>
  </div>
  <div class="section" id="horarios">
    <div class="section-title">🕒 Horario Semanal</div>
    <div id="horarios-contenido"><div class="estado"><div class="estado-spinner"></div>Cargando horario...</div></div>
  </div>
</div>

<script src="../config.js"></script>
<script>
  const CURSO = "tercero";

  function cambiarTab(tab, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    btn.classList.add('active');
  }

  function renderAvisos(filas) {
    if (!filas.length) return '<div class="estado">No hay avisos registrados.</div>';
    return filas.map(f => `
      <div class="item-card">
        <span class="item-meta">${f["Etiqueta"] || ""}</span>
        <h3>${f["Titulo"] || "(sin título)"}</h3>
        <p>${f["Descripcion"] || ""}</p>
      </div>`).join("");
  }

  function renderTareas(filas) {
    if (!filas.length) return '<div class="estado">No hay tareas registradas.</div>';
    return filas.map(f => `
      <div class="item-card">
        <span class="item-meta">${f["Materia"] || ""} · Entrega: ${f["Entrega"] || "—"}</span>
        <h3>${f["Titulo"] || "(sin título)"}</h3>
        <p>${f["Descripcion"] || ""}</p>
      </div>`).join("");
  }

  function renderHorarios(filas) {
    if (!filas.length) return '<div class="estado">No hay horario registrado.</div>';
    const dias = ["Lunes","Martes","Miercoles","Jueves","Viernes"];
    const encabezados = dias.map(d => `<th>${d}</th>`).join("");
    const filaHTML = filas.map(f => {
      const celdas = dias.map(d => {
        const val = f[d] || "";
        return `<td>${val ? `<span class="materia-tag">${val}</span>` : "—"}</td>`;
      }).join("");
      return `<tr><td>${f["Hora"] || ""}</td>${celdas}</tr>`;
    }).join("");
    return `<table class="horario-table"><thead><tr><th>Hora</th>${encabezados}</tr></thead><tbody>${filaHTML}</tbody></table>`;
  }

  async function cargarSeccion(tipo) {
    const cfg = SHEETS_CONFIG[CURSO];
    const contenedor = document.getElementById(`${tipo}-contenido`);
    try {
      const filas = await cargarHoja(cfg.spreadsheetId, cfg.hojas[tipo]);
      if      (tipo === "avisos")   contenedor.innerHTML = renderAvisos(filas);
      else if (tipo === "tareas")   contenedor.innerHTML = renderTareas(filas);
      else if (tipo === "horarios") contenedor.innerHTML = renderHorarios(filas);
    } catch (e) {
      contenedor.innerHTML = `<div class="error-msg">⚠️ No se pudieron cargar los datos.<br>Verifica que el Google Sheet sea público y que el ID en <code>config.js</code> sea correcto.<br><br><small>Detalle técnico: ${e.message}</small></div>`;
    }
  }

  cargarSeccion("avisos");
  cargarSeccion("tareas");
  cargarSeccion("horarios");
</script>
</body>
</html>
